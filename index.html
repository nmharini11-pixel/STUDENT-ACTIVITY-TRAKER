<div class="container">
  <header>
    <h1>Student Activity Tracker</h1>
    <p id="date-display"></p>
  </header>

  <main class="dashboard">
    <section class="input-panel">
      <form id="activity-form">
        <div class="field">
          <label>Activity Name</label>
          <input type="text" id="activity-name" placeholder="e.g., Data Structures Lab" required>
        </div>
        
        <div class="field">
          <label>Category</label>
          <select id="category">
            <option value="Academic">Academic</option>
            <option value="Technical">Technical</option>
            <option value="Personal">Personal</option>
            <option value="Fitness">Fitness</option>
          </select>
        </div>

        <div class="field">
          <label>Hours Spent</label>
          <input type="number" id="hours" min="0.5" step="0.5" placeholder="1.5" required>
        </div>

        <button type="submit" id="add-btn">Log Activity</button>
      </form>
    </section>

    <section class="display-panel">
      <div class="stats">
        <div class="stat-card">Total Hours: <span id="total-hours">0</span></div>
      </div>
      <div id="activity-list" class="grid-layout">
        </div>
    </section>
  </main>
</div>
